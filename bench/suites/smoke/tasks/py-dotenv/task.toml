title = "Implement a .env parser"
domain = "python"
tier = 1
image = "python:3.12-slim"
network = "none"
timeout_secs = 600
prompt = """
The workspace contains `dotenv_parser.py` with an unimplemented function `parse(text)`.
Implement it exactly as its docstring specifies. Do not change the function's name or
signature, and do not add third-party dependencies (there is no network). Verify your
implementation yourself with a few quick cases before finishing.
"""

[[grader.checks]]
name = "hidden unit tests"
cmd = "python3 -m unittest -v test_dotenv"
